<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shifaa QMS Pricing Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0F2544;--blue:#1D72E8;--blue-lt:#EBF3FF;--teal:#0BA888;--teal-lt:#E6F7F3;--gold:#C8952A;--gold-lt:#FEF7E8;--purple:#7C3AED;--purple-lt:#F3EEFF;--orange:#EA580C;--orange-lt:#FFF0E8;--bg:#F2F4F8;--surface:#FFFFFF;--border:#E2E8F0;--text:#0F2544;--mid:#4A6580;--dim:#8FA3B8;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Manrope",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6}
.page{max-width:1040px;margin:0 auto;padding:40px 16px 80px}
.header{text-align:center;margin-bottom:40px}
.logo-wrap{text-align:center;margin-bottom:16px}
.lang-switch{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px}
.lang-btn{padding:6px 18px;border-radius:7px;border:none;background:transparent;font-family:"Manrope",sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--dim);cursor:pointer;transition:all .15s}
.lang-btn.active{background:var(--navy);color:#fff}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:rgba(255,255,255,.65);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:40px;margin-bottom:18px}
.eyebrow .dot{width:6px;height:6px;background:var(--teal);border-radius:50%}
.header h1{font-size:clamp(22px,4vw,42px);font-weight:900;color:var(--navy);letter-spacing:-1px;line-height:1.15;margin-bottom:10px}
.header h1 em{font-style:normal;color:var(--blue)}
.header p{font-size:15px;color:var(--mid);max-width:520px;margin:0 auto;line-height:1.7}
.saf-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.saf-card::after{content:"";position:absolute;bottom:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(200,149,42,.07) 0%,transparent 70%);pointer-events:none}
.saf-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.saf-eyebrow{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.saf-eyebrow::before{content:"";width:5px;height:5px;background:var(--gold);border-radius:50%;display:inline-block}
.saf-card h3{font-size:20px;font-weight:900;color:var(--navy);letter-spacing:-.5px;line-height:1.25}
.saf-card h3 span{color:var(--gold)}
.saf-pill{background:var(--gold-lt);border:1.5px solid rgba(200,149,42,.25);border-radius:14px;padding:12px 20px;text-align:center;flex-shrink:0}
.saf-pill-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.saf-pill-val{font-size:28px;font-weight:900;color:var(--gold);letter-spacing:-1px;line-height:1}
.saf-pill-sub{font-size:10px;color:var(--dim);margin-top:3px}
.saf-gifts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:700px){.saf-gifts{grid-template-columns:1fr}}
.saf-gift{background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:18px;position:relative}
.saf-free-tag{position:absolute;top:14px;right:14px;font-size:9px;font-weight:900;letter-spacing:2px;color:var(--teal);background:var(--teal-lt);border:1px solid rgba(11,168,136,.25);padding:3px 8px;border-radius:4px}
.saf-gift-icon{font-size:24px;margin-bottom:10px;display:block}
.saf-gift-title{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:5px;padding-right:48px}
.saf-gift-desc{font-size:12px;color:var(--mid);line-height:1.6}
.saf-gift-was{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px}
.saf-gift-was .strike{text-decoration:line-through}
.saf-gift-was .saved{color:var(--teal);font-weight:700}
.calc-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}
@media(max-width:820px){.calc-layout{grid-template-columns:1fr}}
.left-col{display:flex;flex-direction:column;gap:16px;min-width:0}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:24px}
.card-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.step-num{width:22px;height:22px;background:var(--navy);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.sl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sl-lbl{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.sl-numrow{display:flex;align-items:baseline;gap:4px}
.sl-num{font-size:28px;font-weight:900;color:var(--navy);line-height:1;letter-spacing:-1px;min-width:32px;text-align:right}
.sl-unit{font-size:12px;color:var(--dim)}
.track{position:relative;height:6px;background:var(--border);border-radius:10px;margin-bottom:6px}
.track-fill{position:absolute;left:0;top:0;height:100%;border-radius:10px;background:var(--gold);transition:width .08s}
input[type=range]{position:absolute;top:50%;left:0;width:100%;transform:translateY(-50%);-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;margin:0;height:24px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--gold);border:3px solid #fff;box-shadow:0 2px 8px rgba(200,149,42,.3);cursor:pointer;transition:transform .1s}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.15)}
.track-marks{display:flex;justify-content:space-between;margin-top:5px}
.track-mark{font-size:10px;color:var(--dim);font-weight:600}
.addon-rows{display:flex;flex-direction:column;gap:10px}
.atr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;user-select:none}
.atr:hover{border-color:var(--blue);background:var(--blue-lt)}
.atr.on-teal{border-color:var(--teal);background:var(--teal-lt)}
.atr.on-purple{border-color:var(--purple);background:var(--purple-lt)}
.atr.on-orange{border-color:var(--orange);background:var(--orange-lt)}
.atr.on-blue{border-color:var(--blue);background:var(--blue-lt)}
.atr-icon{font-size:18px;flex-shrink:0}
.atr-info{flex:1;min-width:0}
.atr-name{font-size:13px;font-weight:700;color:var(--text)}
.atr-desc{font-size:11px;color:var(--mid);margin-top:1px}
.atr-price{font-size:12px;font-weight:800;padding:3px 8px;border-radius:6px;white-space:nowrap;border:1.5px solid var(--border);color:var(--mid);background:var(--bg);flex-shrink:0;transition:all .15s}
.atr.on-teal .atr-price{color:var(--teal);background:var(--teal-lt);border-color:rgba(11,168,136,.2)}
.atr.on-purple .atr-price{color:var(--purple);background:var(--purple-lt);border-color:rgba(124,58,237,.2)}
.atr.on-orange .atr-price{color:var(--orange);background:var(--orange-lt);border-color:rgba(234,88,12,.2)}
.atr.on-blue .atr-price{color:var(--blue);background:var(--blue-lt);border-color:rgba(29,114,232,.2)}
.tgl{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;flex-shrink:0;transition:background .2s}
.atr.on-teal .tgl{background:var(--teal)}
.atr.on-purple .tgl{background:var(--purple)}
.atr.on-orange .tgl{background:var(--orange)}
.atr.on-blue .tgl{background:var(--blue)}
.tgl-k{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.atr.on-teal .tgl-k,.atr.on-purple .tgl-k,.atr.on-orange .tgl-k,.atr.on-blue .tgl-k{transform:translateX(16px)}
.breakdown{background:var(--navy);border-radius:18px;overflow:hidden;position:sticky;top:16px;box-shadow:0 20px 60px rgba(15,37,68,.25)}
@media(max-width:820px){.breakdown{position:static}}
.bd-head{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.bd-eye{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.live-dot{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.bd-period{font-size:11px;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:3px}
.bd-total-val{font-size:48px;font-weight:900;color:#fff;line-height:1;letter-spacing:-2.5px}
.bdtc{font-size:20px;color:rgba(255,255,255,.5);vertical-align:super;font-weight:700;letter-spacing:0}
.bdtp{font-size:14px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:0;margin-left:1px}
.bd-sec{padding:14px 22px 2px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.22)}
.bd-body{padding:2px 22px 10px}
.bdr{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;gap:12px}
.bdr:last-child{border-bottom:none}
.bdr-l{color:rgba(255,255,255,.5);line-height:1.4;flex:1}
.bdr-r{font-weight:700;color:#fff;white-space:nowrap}
.bdr-r.tl{color:#5EEAD4}
.bdr-r.dm{color:rgba(255,255,255,.3);font-weight:400;font-size:12px}
.bd-div{border:none;border-top:1px solid rgba(255,255,255,.12);margin:6px 22px}
.bd-grand{display:flex;justify-content:space-between;align-items:center;padding:12px 22px 4px}
.bd-grand-lbl{color:#fff;font-weight:800;font-size:15px}
.bd-grand-val{color:#5EEAD4;font-size:22px;font-weight:900;letter-spacing:-1px}
.bd-saf{margin:4px 22px 12px;background:var(--gold-lt);border:1.5px solid rgba(200,149,42,.25);border-radius:10px;padding:12px 14px}
.bd-saf-title{color:var(--gold);font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.bd-saf-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12.5px}
.bd-saf-lbl{color:var(--mid)}
.bd-saf-free{color:var(--teal);font-weight:800}
.bd-saf-strike{text-decoration:line-through;color:var(--dim);font-size:11px}
.bd-cta{display:block;width:calc(100% - 44px);margin:0 22px 22px;background:var(--teal);color:#fff;font-size:14px;font-weight:700;padding:14px;border-radius:12px;text-align:center;border:none;cursor:pointer;font-family:"Manrope",sans-serif}
.bd-cta:hover{opacity:.88}
.page-div{border:none;border-top:1px solid var(--border);margin:56px 0}
.bottom{background:var(--navy);border-radius:18px;padding:36px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.bt-h{font-size:26px;font-weight:900;color:var(--gold);letter-spacing:-.5px;margin-bottom:8px}
.bt-p{font-size:14px;color:rgba(255,255,255,.6);max-width:380px;line-height:1.7}
.bt-r{text-align:right;flex-shrink:0}
.bt-r p{font-size:10px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.bt-r a{font-size:15px;font-weight:700;color:#93C5FD;text-decoration:none}
.footer{text-align:center;margin-top:32px;font-size:12px;color:var(--dim)}
.footer a{color:var(--blue);font-weight:600;text-decoration:none}
</style>
</head>

};

var BASE = 264, PER_FLOOR = 80;
var ADDONS = {
  sms:     { price: 99, color: "on-teal"   },
  report:  { price: 69, color: "on-purple" },
  survey:  { price: 49, color: "on-orange" },
  support: { price: 99, color: "on-blue"   }
};
var floor = 0;
var addonOn = { sms:false, report:false, survey:false, support:false };
var currentLang = "en";
var currentTotal = BASE;

function setLang(lang) {
  currentLang = lang;
  var s = STRINGS[lang];
  document.getElementById("btn-en").classList.toggle("active", lang === "en");
  document.getElementById("btn-az").classList.toggle("active", lang === "az");
  document.querySelectorAll("[data-k]").forEach(function(el) {
    var k = el.getAttribute("data-k");
    if (s[k] !== undefined) {
      if (k === "bt_h") el.innerHTML = s[k];
      else el.textContent = s[k];
    }
  });
  document.getElementById("su-floor").textContent = floor === 1 ? s.fl_unit1 : s.fl_unit;
  document.getElementById("cta-btn").onclick = function() { sendRequest(); };
  ADDONS.sms.label     = s.js_a1;
  ADDONS.report.label  = s.js_a2;
  ADDONS.survey.label  = s.js_a3;
  ADDONS.support.label = s.js_a4;
  recalc();
}

function updSlider() {
  floor = parseInt(document.getElementById("sr-floor").value);
  document.getElementById("sf-floor").style.width = (floor / 7 * 100) + "%";
  document.getElementById("sv-floor").textContent = floor;
  document.getElementById("su-floor").textContent = floor === 1 ? STRINGS[currentLang].fl_unit1 : STRINGS[currentLang].fl_unit;
  recalc();
}

function togAddon(key) {
  addonOn[key] = !addonOn[key];
  var el = document.getElementById("tog-" + key);
  if (addonOn[key]) el.classList.add(ADDONS[key].color);
  else el.classList.remove("on-teal","on-purple","on-orange","on-gold","on-blue");
  recalc();
}

function recalc() {
  var s = STRINGS[currentLang];
  var floorCost = floor <= 1 ? 0 : (floor - 1) * PER_FLOOR;
  var base = BASE + floorCost;
  var addonSum = 0, active = [];
  Object.keys(addonOn).forEach(function(k) { if (addonOn[k]) { addonSum += ADDONS[k].price; active.push(k); } });
  var total = base + addonSum;
  currentTotal = total;
  var az = "₼", x = "×";
  document.getElementById("bd-amt").textContent = total;
  document.getElementById("bd-grand").textContent = az + total + "/" + s.per_mo;
  var bh = bdr(s.js_base, az + BASE);
  if (floor === 0) bh += bdr(s.js_fl0, az + "0", "dm");
  else if (floor === 1) bh += bdr(s.js_fl1, "FREE", "tl");
  else bh += bdr(floor + s.js_flN + (floor-1) + " " + x + " " + az + PER_FLOOR + ")", "+" + az + floorCost);
  document.getElementById("bd-base").innerHTML = bh;
  var adSec = document.getElementById("bds-addons");
  var adBody = document.getElementById("bd-addons");
  if (active.length === 0) { adSec.style.display = "none"; adBody.innerHTML = ""; }
  else {
    adSec.style.display = "block";
    adBody.innerHTML = active.map(function(k) { return bdr(ADDONS[k].label, "+" + az + ADDONS[k].price); }).join("");
  }
}

function bdr(l, v, cls) {
  return "<div class=\"bdr\"><span class=\"bdr-l\">" + l + "</span><span class=\"bdr-r " + (cls||"") + "\">" + v + "</span></div>";
}

function sendRequest() {
  var s = STRINGS[currentLang];
  var btn = document.getElementById("cta-btn");
  btn.disabled = true;
  btn.textContent = s.cta_sending;
  btn.style.opacity = "0.6";

  fetch("/api/safhospital/request", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      floors: floor,
      addons: addonOn,
      total: currentTotal,
      language: currentLang
    })
  })
  .then(function(res) {
    if (!res.ok) throw new Error("fail");
    btn.textContent = s.cta_success;
    btn.style.background = "var(--navy)";
    setTimeout(function() {
      btn.textContent = s.cta;
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.style.background = "var(--teal)";
    }, 4000);
  })
  .catch(function() {
    btn.textContent = s.cta_error;
    btn.style.background = "var(--orange)";
    setTimeout(function() {
      btn.textContent = s.cta;
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.style.background = "var(--teal)";
    }, 3000);
  });
}

setLang("en");
